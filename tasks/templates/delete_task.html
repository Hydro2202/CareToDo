{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delete Task</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="min-h-screen bg-red-500 font-sans flex items-center justify-center p-6">
  <div class="relative w-full max-w-2xl rounded-3xl bg-white p-10 shadow-2xl shadow-black/25">
    <a
      href="{% url 'task_list' %}"
      aria-label="Close dialog"
      class="absolute right-6 top-6 inline-flex h-10 w-10 items-center justify-center rounded-full text-2xl font-semibold text-slate-400 transition hover:bg-slate-100 hover:text-slate-700"
    >
      &times;
    </a>

    <div class="flex min-h-[560px] flex-col items-center text-center">
      <div class="flex h-20 w-20 items-center justify-center rounded-full bg-rose-100 text-4xl ring-1 ring-rose-200">
        🗑️
      </div>

      <h1 class="mt-7 text-5xl font-black tracking-tight text-slate-900">Delete Task?</h1>
      <p class="mt-4 text-lg text-slate-700">
        Are you sure you want to delete
        <span class="font-bold text-slate-900">"{{ task.title|default:"HELP THE PATIENT" }}"</span>?
      </p>
      <p class="mt-2 text-base text-slate-400">You can't undo this action.</p>

      <div class="mt-10 w-full max-w-xl rounded-2xl border border-orange-300 bg-orange-50 p-6 text-center">
        <p class="inline-flex items-center gap-2 text-sm font-bold text-orange-600">
          <span aria-hidden="true">⚠️</span>
          Warning
        </p>
        <p class="mt-3 text-base font-medium leading-relaxed text-orange-700">
          By deleting this task, all connected data will also be deleted.
        </p>
      </div>

      <div class="mt-auto flex w-full items-center justify-center gap-5 pt-12">
        <form method="POST" class="m-0 flex">
          {% csrf_token %}
          <button
            type="submit"
            class="inline-flex h-14 min-w-[220px] items-center justify-center gap-2 rounded-full px-8 py-3 text-base font-bold text-white shadow-lg shadow-rose-300/60 transition hover:brightness-95"
            style="background-color: #e11d48; color: #FFFFFF;"
          >
            Delete
            <span aria-hidden="true">🗑️</span>
          </button>
        </form>

        <a
          href="{% url 'task_list' %}"
          class="inline-flex h-14 min-w-[220px] items-center justify-center rounded-full bg-slate-700 px-8 py-3 text-base font-semibold text-white transition hover:bg-slate-800"
        >
          Cancel
        </a>
      </div>
    </div>
  </div>
</body>
</html>
