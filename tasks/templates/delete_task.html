{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delete Task</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">

  <div class="w-full max-w-2xl rounded-[32px] bg-white p-10 shadow-xl ring-1 ring-slate-200">
    
    <div class="mb-6 flex items-center gap-4">
      <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-rose-100 text-3xl">
        🗑️
      </div>
      <div>
        <p class="text-sm font-semibold uppercase tracking-[0.2em] text-rose-500">Delete Confirmation</p>
        <h1 class="mt-1 text-4xl font-bold tracking-tight text-slate-900">Delete Task</h1>
      </div>
    </div>

    <div class="rounded-2xl border border-slate-200 bg-slate-50 p-6">
      <p class="text-lg text-slate-700">
        Are you sure you want to delete
        <span class="font-bold text-slate-900">"{{ task.title }}"</span>?
      </p>
      <p class="mt-3 text-sm text-slate-500">
        This action cannot be undone. Once deleted, this task will be removed permanently.
      </p>
    </div>

    <div class="mt-8 flex flex-wrap items-center gap-4">
      <form method="POST" class="m-0">
        {% csrf_token %}
        <button
          type="submit"
          class="inline-flex items-center justify-center rounded-2xl bg-rose-500 px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-rose-200 transition hover:bg-rose-600"
        >
          Yes, Delete Task
        </button>
      </form>

      <a
        href="{% url 'task_list' %}"
        class="inline-flex items-center justify-center rounded-2xl bg-slate-200 px-6 py-3 text-sm font-semibold text-slate-800 transition hover:bg-slate-300"
      >
        Cancel
      </a>
    </div>

  </div>

</body>
</html>
