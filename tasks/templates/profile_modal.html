<style>
  #profile-modal {
    opacity: 0;
    transition: opacity 240ms ease;
  }

  #profile-modal.is-visible {
    opacity: 1;
  }

  #profile-modal-card {
    opacity: 0;
    transform: translate(-50%, -48%) scale(0.96);
    transition: transform 260ms cubic-bezier(0.22, 1, 0.36, 1), opacity 220ms ease;
  }

  #profile-modal.is-visible #profile-modal-card {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
</style>

<div id="profile-modal" class="fixed inset-0 z-[9999] hidden bg-slate-950/55 backdrop-blur-sm">
  <div id="profile-modal-card" class="fixed left-1/2 top-1/2 w-[min(94vw,38rem)] -translate-x-1/2 -translate-y-1/2 overflow-hidden rounded-3xl border border-white/30 bg-white shadow-2xl ring-1 ring-slate-200/70">
    <div class="relative bg-gradient-to-r from-sky-600 via-cyan-500 to-teal-400 px-6 py-5 text-white">
      <div class="absolute -right-8 -top-8 h-28 w-28 rounded-full bg-white/20 blur-xl"></div>
      <div class="absolute -bottom-8 left-16 h-20 w-20 rounded-full bg-cyan-200/30 blur-lg"></div>
      <div class="relative flex items-start justify-between gap-4">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.18em] text-white/80">CareToGo Profile</p>
          <h3 class="mt-1 text-2xl font-bold tracking-tight">Update Your Information</h3>
          <p class="mt-1 text-sm text-white/85">Keep your identity and department details accurate.</p>
        </div>
        <button type="button" data-profile-close class="rounded-xl bg-white/20 px-3 py-2 text-xs font-semibold text-white backdrop-blur hover:bg-white/30">
          Close
        </button>
      </div>
    </div>

    <div class="bg-white px-6 py-6">
      <p id="profile-feedback" class="mb-4 hidden rounded-xl px-4 py-3 text-sm font-medium"></p>

      <form id="profile-form" class="space-y-5">
      {% csrf_token %}
      <div>
        <label for="profile-name-input" class="mb-2 block text-sm font-semibold text-slate-700">Name</label>
        <input id="profile-name-input" name="name" type="text" maxlength="150" required class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-800 outline-none transition duration-200 focus:-translate-y-0.5 focus:border-sky-400 focus:ring-4 focus:ring-sky-100">
        <p id="profile-name-error" class="mt-2 text-sm text-rose-600"></p>
      </div>

      <div>
        <label for="profile-department-input" class="mb-2 block text-sm font-semibold text-slate-700">Department</label>
        <input id="profile-department-input" name="department" type="text" maxlength="100" required class="w-full rounded-2xl border border-slate-300 bg-white px-4 py-3 text-sm text-slate-800 outline-none transition duration-200 focus:-translate-y-0.5 focus:border-sky-400 focus:ring-4 focus:ring-sky-100">
        <p id="profile-department-error" class="mt-2 text-sm text-rose-600"></p>
      </div>

      <div class="pt-2">
        <button id="profile-save-button" type="submit" class="w-full rounded-2xl bg-gradient-to-r from-slate-900 to-sky-700 px-5 py-3.5 text-sm font-semibold text-white shadow-lg shadow-slate-300/40 transition duration-200 hover:-translate-y-0.5 hover:from-slate-800 hover:to-sky-600">
          Save / Update
        </button>
      </div>
      </form>
    </div>
  </div>
</div>
