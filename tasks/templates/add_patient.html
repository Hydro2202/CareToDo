{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Patient</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
  <script defer src="{% static 'js/auth-session.js' %}"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">
  <div class="max-w-5xl mx-auto px-5 py-10 sm:px-8">
    <div class="mb-8 flex items-center justify-between">
      <div>
        <p class="text-sm font-medium text-sky-600">Patient Creation</p>
        <h1 class="text-3xl font-bold tracking-tight text-slate-900">Add New Patient</h1>
      </div>
      <a href="{% url 'patient_list' %}" class="rounded-2xl bg-white px-5 py-3 text-sm font-semibold text-slate-700 ring-1 ring-slate-200 hover:bg-slate-50">Back to Patients</a>
    </div>

    <div class="rounded-[28px] border border-slate-200 bg-white p-8 shadow-sm">
      <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div class="grid gap-5 md:grid-cols-2">
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">Full Name</label>
            <input type="text" name="full_name" required class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm focus:border-sky-400 focus:ring-4 focus:ring-sky-100 outline-none">
          </div>
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">Age</label>
            <input type="number" min="0" name="age" required class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm focus:border-sky-400 focus:ring-4 focus:ring-sky-100 outline-none">
          </div>
        </div>

        <div class="grid gap-5 md:grid-cols-2">
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">Gender</label>
            <select name="gender" required class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm focus:border-sky-400 focus:ring-4 focus:ring-sky-100 outline-none">
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label class="mb-2 block text-sm font-semibold text-slate-700">Contact Information</label>
            <input type="text" name="contact_information" required class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm focus:border-sky-400 focus:ring-4 focus:ring-sky-100 outline-none">
          </div>
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Address</label>
          <textarea name="address" rows="3" required class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm focus:border-sky-400 focus:ring-4 focus:ring-sky-100 outline-none"></textarea>
        </div>

        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-700">Medical Notes (Optional)</label>
          <textarea name="medical_notes" rows="4" class="w-full rounded-2xl border border-slate-300 px-4 py-3 text-sm focus:border-sky-400 focus:ring-4 focus:ring-sky-100 outline-none"></textarea>
        </div>

        <div class="flex gap-3">
          <button type="submit" class="rounded-2xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white hover:bg-slate-800">Save Patient</button>
          <a href="{% url 'patient_list' %}" class="rounded-2xl bg-slate-100 px-6 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-200">Cancel</a>
        </div>
      </form>
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof initAuthGuard === "function") initAuthGuard();
    });
  </script>
</body>
</html>
